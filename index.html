<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilhabela Roleplay</title>

    <!-- Fonte estilizada -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Bebas Neue', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(60,0,80,0.7), rgba(20,0,40,0.9)),
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 15px;
            border-top: 2px solid white;
            border-bottom: 2px solid white;
            padding: 15px 0;
            letter-spacing: 2px;
        }

        .ilhabela {
            color: #FFD700; /* amarelo */
        }

        .roleplay {
            color: #00BFFF; /* azul */
        }

        p {
            margin-bottom: 25px;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            border-radius: 12px;
            padding: 15px;
            margin: 12px 0;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            font-size: 18px;
        }

        .link:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.07);
        }

        .link img {
            width: 28px;
            height: 28px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            <span class="ilhabela">ILHABELA</span>
            <span class="roleplay">ROLEPLAY</span>
        </h1>

        <p>VENHA CONHECER NOSSO SERVIDOR SA-MP<br>
        MAIS INFORMAÇÕES LINKS ABAIXO</p>

        <!-- DISCORD -->
        <a class="link" href="https://discord.gg/r4Ye7CpX" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
            [ ILHABELA ROLEPLAY DC ]
        </a>

        <!-- WHATSAPP -->
        <a class="link" href="https://chat.whatsapp.com/HjcNE32jaLN3EqtnRp9Le4?mode=gi_t" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
            GRUPO WHATSAPP
        </a>

        <div class="footer">
            © Ilhabela Roleplay
        </div>
    </div>

</body>
</html>
